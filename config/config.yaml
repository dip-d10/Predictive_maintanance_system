artifacts_root: artifacts

data_ingestion:
  root_dir: artifacts/data_ingestion 
  database_name: predictive_maintenance_db
  collections:
    - telemetry
    - errors
    - failures
    - machines
    - maintenance
  raw_data_dir: artifacts/data_ingestion/raw_data


data_validation:
  root_dir: artifacts/data_validation
  raw_data_dir: artifacts/data_ingestion/raw_data
  schema_file_path: schema.yaml
  status_file: artifacts/data_validation/status.txt
  merged_dataset_path: artifacts/data_validation/master_dataset.csv


feature_engineering:
  root_dir: artifacts/feature_engineering
  master_data_path: artifacts/data_validation/master_dataset.csv
  feature_store_path: artifacts/feature_engineering/feature_store.csv
  final_feature_path: artifacts/feature_engineering/final_feature_dataset.csv
  lag_features: [1, 3, 6]
  rolling_windows: [3, 12, 24]
  prediction_horizons: [24]
  telemetry_columns:
    - volt
    - rotate
    - pressure
    - vibration
  machine_id_column: machineID
  datetime_column: datetime
  failure_column: failure



model_trainer:
  root_dir: artifacts/model_trainer
  trained_model_dir: artifacts/model_trainer/models
  train_data_path: artifacts/model_trainer/train.csv
  test_data_path: artifacts/model_trainer/test.csv
  metrics_file_path: artifacts/model_trainer/model_metrics.json

  test_size: 0.2
  random_state: 42
  max_training_rows: 50000

  target_column: failure_within_next_24h

  model_params:
    logistic_regression:
      C: 1.0
      solver: liblinear
      max_iter: 1000

    random_forest:
      n_estimators: 25
      max_depth: 10
      n_jobs: -1

    xgboost:
      n_estimators: 20
      max_depth: 6
      learning_rate: 0.05  
      n_jobs: -1
      tree_method: hist

model_evaluation:
  root_dir: artifacts/model_evaluation

  evaluation_report_path: artifacts/model_evaluation/evaluation_report.json

  threshold_report_path: artifacts/model_evaluation/threshold_report.json

  best_model_path: artifacts/model_evaluation/best_model.joblib

  downtime_cost: 10000
  maintenance_cost: 1000

  min_pr_auc_threshold: 0.60

model_pusher:
  root_dir: artifacts/model_pusher
  metadata_local_path: artifacts/model_pusher/metadata.json

azure_blob:
  container_name: ml-models
# ============================================================
# PREDICTION PIPELINE CONFIGURATIONS
# ============================================================

prediction_data_ingestion:
  database_name: predictive_maintenance_db
  telemetry_collection: telemetry
  machines_collection: machines
  errors_collection: errors
  maintenance_collection: maintenance
  predictions_collection: predictions
  prediction_data_dir: artifacts/prediction_data_ingestion
  lookback_hours: 24


prediction_feature_engineering:
  prediction_features_dir: artifacts/prediction_feature_engineering


model_loader:
  production_model_blob_path: production/model.joblib
  production_metadata_blob_path: production/metadata.json
  model_cache_dir: artifacts/model_cache
  default_threshold: 0.5


predictor:
  predictions_dir: artifacts/predictions
  high_risk_threshold: 0.7
  medium_risk_threshold: 0.5


prediction_storage:
  database_name: predictive_maintenance_db
  predictions_collection: predictions
  prediction_summary_collection: prediction_summaries


alert_manager:
  alerts_log_dir: artifacts/alerts
  enable_email: false
  email_recipients: []
  enable_slack: false
  slack_channel: '#maintenance-alerts'


# ============================================================
# SCHEDULER CONFIGURATIONS
# ============================================================

scheduler:
  weekly_retraining:
    enabled: true
    schedule: '0 2 * * 0'  # Sunday 2 AM UTC
    max_retries: 3
    timeout_minutes: 120

  hourly_prediction:
    enabled: true
    schedule: '0 * * * *'  # Every hour
    max_retries: 2
    timeout_minutes: 30
  enabled: true
  schedule: '0 * * * *'  # Every hour
  max_retries: 2
  timeout_minutes: 30

# ============================================================
# DEMO MODE - PREDICTION DATASET CONFIGURATION
# ============================================================

prediction_data:
  prediction_input_path: artifacts/prediction/prediction_input_dataset.csv
  error_window_hours: 24
  maintenance_window_hours: 168
